defaults:
  - dataset: mnist
  - _self_

seed: 42
batch_size: 512
num_workers: 4
output_dir: outputs
resume: null
log_interval: 1
save_interval: 10
sample_interval: 1
data_root: data

hydra:
  run:
    dir: ${output_dir}/${dataset.name}/${now:%Y%m%d_%H%M%S}
  output_subdir: null
  job:
    chdir: true
