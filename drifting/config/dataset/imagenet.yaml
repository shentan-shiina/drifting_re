name: imagenet-tiny
model: DriftDiT-Tiny

use_feature_encoder: false
use_latent: false

img_size: 32 # img_size/8 if use latents
in_channels: 3  # for latents space use 4, for pixel space use 3
num_classes: 200
samples_per_class: 5
batch_nc: 5
batch_n_pos: 2
batch_n_neg: 2

temperatures: [0.02, 0.05, 0.2]
lr: 0.0002
weight_decay: 0.01
grad_clip: 2.0
ema_decay: 0.999
warmup_steps: 2000
epochs: 200
alpha_min: 1.0
alpha_max: 3.0
queue_size: 128
label_dropout: 0.1



