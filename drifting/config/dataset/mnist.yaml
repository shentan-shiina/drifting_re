name: mnist
model: DriftDiT-Tiny

use_feature_encoder: false
use_latent: false
use_flip: false
use_spatial_features: false
precompute_drop_flip: true
fid_drop_flip: true

img_size: 28
in_channels: 1
patch_size: 4
num_register_tokens: 16

num_classes: 10
samples_per_class: 10
batch_nc: 10
batch_n_pos: 8
batch_n_neg: 8

uncond_neg_samples: 0
uncond_neg_weight: 1.0

epochs: 2000
temperatures: [0.02, 0.05, 0.2]
lr: 0.0002
weight_decay: 0.01
grad_clip: 2.0
ema_decay: 0.999
warmup_steps: 2000
alpha_min: 1.0
alpha_max: 3.0
queue_size: 128
label_dropout: 0.1

mae:
  epochs: 1000
  finetune_steps: 3000
  lr: 0.001
  finetune_lr: 0.001
  weight_decay: 0.05
  feature_dim: 512
  base_width: 64
  blocks_per_stage: [3, 4, 6, 3]
  multi_scale: true
  mae_input_patch: 1
  mask_block_size: 2
  mask_prob: 0.5
  finetune_classifier: true
  lambda_max: 0.1
  lambda_warmup_steps: 1000