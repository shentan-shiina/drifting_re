defaults:
  - dataset: mnist
  - _self_

checkpoint: /home/ubt/1git/drifting_re/outputs/mnist/run_1/checkpoints/last.ckpt
output_dir: /home/ubt/1git/drifting_re/outputs/samples
data_root: /home/ubt/1git/drifting_re/data


samples:
  num_samples: 100
  samples_per_class: 10
  alpha: 1.5
  seed: 42
  compute_fid: true
  fid_num_samples: 1000
  fid_batch_size: 256
  fid_stats_path: ${data_root}/${dataset.name}/fid_stats/${dataset.name}_fid_stats.npz

num_workers: 4


hydra:
  run:
    dir: ${output_dir}/${dataset.name}/${now:%Y%m%d_%H%M%S}
  output_subdir: null
  job:
    chdir: true
